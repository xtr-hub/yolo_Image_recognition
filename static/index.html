<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物体识别 API - 图片/视频/摄像头</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="物体识别系统">
    <meta name="theme-color" content="#667eea">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 2.2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .mode-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .mode-btn:hover {
            background: #f0f2ff;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #e8eaff;
            border-color: #764ba2;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        #fileInput, #videoInput {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }
        .preview-section {
            margin-top: 20px;
            display: none;
        }
        .preview-section.active {
            display: block;
        }
        .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            background: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
        }
        #previewImage, #videoPreview {
            max-width: 100%;
            max-height: 70vh;  /* 限制最大高度，但仍保持响应性 */
            display: block;
            margin: 0 auto;
            border-radius: 8px; /* 添加圆角 */
        }

        .camera-video {
            width: 100%;
            max-height: 70vh;
            object-fit: contain; /* 保持宽高比，避免变形 */
            background: #000;
            border-radius: 8px; /* 添加圆角 */
        }

        .image-container {
            position: relative;
            display: inline-block; /* 让容器适应内容大小 */
            max-width: 100%;
            width: fit-content; /* 容器宽度适应内容 */
            background: transparent; /* 移除背景色 */
            border-radius: 8px;
            overflow: visible; /* 不裁剪内容 */
            box-shadow: none; /* 移除阴影，使看起来更透明 */
        }
        .video-controls {
            margin-top: 15px;
            text-align: center;
            display: flex;
            flex-direction: column; /* 移动端垂直排列 */
            align-items: center;
            gap: 10px; /* 控制元素间距 */
        }

        @media (min-width: 768px) {
            .video-controls {
                flex-direction: row; /* 桌面端水平排列 */
                justify-content: center;
            }
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .result-section {
            margin-top: 20px;
            display: none;
        }
        .result-section.active {
            display: block;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
            margin-top: 5px;
        }
        .person-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .object-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
        }
        .object-item:hover {
            background: #e8eaff;
        }
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .message.error {
            background: #fee;
            color: #c33;
        }
        .message.success {
            background: #efe;
            color: #3c3;
        }
        .message.info {
            background: #e8f4ff;
            color: #0066cc;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #f0f2ff;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        .status-dot.connected {
            background: #00c853;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .fps-counter {
            font-family: monospace;
            font-weight: bold;
            color: #667eea;
        }
        .hidden {
            display: none !important;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        /* 移动设备响应式设计 */
        @media (max-width: 767px) {
            .container {
                padding: 5px; /* 减少移动端内边距 */
            }

            h1 {
                font-size: 1.6em; /* 减小标题字体大小 */
                margin-bottom: 15px;
            }

            .card {
                padding: 15px; /* 减少卡片内边距 */
                margin-bottom: 15px;
            }

            .mode-tabs {
                flex-direction: column; /* 移动端垂直堆叠模式按钮 */
                gap: 8px;
            }

            .mode-btn {
                padding: 12px; /* 调整按钮内边距 */
                font-size: 14px;
                min-width: auto; /* 允许按钮适应内容宽度 */
            }

            .upload-area {
                padding: 20px 15px; /* 减少上传区域内边距 */
            }

            .btn {
                padding: 10px 15px; /* 减少按钮内边距 */
                font-size: 14px;
                width: 100%; /* 按钮全宽适应移动端 */
                margin: 3px 0;
            }

            .video-controls select {
                width: 100%;
                margin-bottom: 8px;
            }

            .stats {
                grid-template-columns: 1fr; /* 移动端单列显示统计卡片 */
                gap: 10px;
            }

            .stat-card {
                padding: 12px; /* 减少统计卡片内边距 */
            }

            .stat-value {
                font-size: 1.4em; /* 减小统计数值字体大小 */
            }
        }

        @media (min-width: 768px) {
            .video-controls {
                flex-direction: row; /* 桌面端水平排列 */
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 物体识别系统</h1>

        <!-- 模式选择 -->
        <div class="card">
            <!-- 设置入口按钮 -->
            <div style="text-align: center; margin-bottom: 15px;">
                <button class="btn" id="toggleSettingsBtn" style="min-width: 150px;">⚙️ 检测设置</button>
            </div>
            <!-- 设置区域（默认隐藏） -->
            <div class="settings-section" id="settingsPanel" style="display: none; margin-bottom: 20px; padding: 15px; background: #f8f9ff; border-radius: 8px;">
                <h3 style="margin-bottom: 12px; color: #667eea; text-align: center;">检测参数配置</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center;">
                    <div style="flex: 1; min-width: 180px; max-width: 250px; display: flex; flex-direction: column; justify-content: center;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #333;">检测类别</label>
                        <select id="classesSelect" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px;">
                            <option value="">全部类别 (80 种)</option>
                            <option value="person">仅人员</option>
                            <option value="person,car">人员 + 车辆</option>
                            <option value="car,motorcycle,bus,truck">所有车辆</option>
                            <option value="cat,dog">宠物 (猫/狗)</option>
                            <option value="chair,couch,bed,dining table">家具</option>
                            <option value="tv,laptop,cell phone,keyboard,mouse">电子产品</option>
                            <option value="banana,apple,orange,carrot,broccoli">水果蔬菜</option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 180px; max-width: 250px; display: flex; flex-direction: column; justify-content: center;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #333;">置信度阈值</label>
                        <select id="confThreshold" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px;">
                            <option value="0.3">0.3 (低)</option>
                            <option value="0.5" selected>0.5 (中)</option>
                            <option value="0.7">0.7 (高)</option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 180px; max-width: 250px; display: flex; flex-direction: column; justify-content: center;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #333;">视频批处理大小</label>
                        <select id="batchSize" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px;">
                            <option value="4">4 帧 (省内存)</option>
                            <option value="8" selected>8 帧 (平衡)</option>
                            <option value="16">16 帧 (高性能)</option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 180px; max-width: 250px; display: flex; flex-direction: column; justify-content: center;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #333;">视频帧间隔</label>
                        <select id="frameInterval" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px;">
                            <option value="1" selected>每帧检测</option>
                            <option value="2">隔帧检测 (2 帧 1 次)</option>
                            <option value="3">每 3 帧检测 1 次</option>
                        </select>
                    </div>
                    <div style="flex: 0 0 auto; display: flex; align-items: center; padding-top: 16px; gap: 8px;">
                        <button class="btn" id="applySettingsBtn" style="min-width: 100px;">✅ 应用</button>
                        <button class="btn" id="resetSettingsBtn" style="min-width: 100px; background: linear-gradient(135deg, #999 0%, #777 100%);">🔄 重置</button>
                        <button class="btn" id="closeSettingsBtn" style="min-width: 100px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">❌ 关闭</button>
                    </div>
                </div>
            </div>

            <div class="mode-tabs">
                <button class="mode-btn active" data-mode="image">📷 图片检测</button>
                <button class="mode-btn" data-mode="camera">🎥 实时摄像头</button>
                <button class="mode-btn" data-mode="video">🎬 视频文件</button>
            </div>
            
            <!-- 状态栏 -->
            <div class="status-bar" id="statusBar" style="display: none;">
                <span class="status-indicator">
                    <span class="status-dot" id="wsStatus"></span>
                    <span id="wsStatusText">未连接</span>
                </span>
                <span class="fps-counter" id="fpsCounter"></span>
            </div>

            <!-- 图片上传模式 -->
            <div id="imageMode">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📤</div>
                    <p>点击或拖拽上传图片</p>
                    <p style="color: #666; font-size: 14px; margin-top: 10px;">支持 JPG、PNG、BMP 格式</p>
                </div>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <!-- 摄像头模式 -->
            <div id="cameraMode" class="hidden">
                <div class="video-controls">
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 10px;">
                        <select id="cameraFacingMode" style="padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                            <option value="user">前置摄像头</option>
                            <option value="environment">后置摄像头</option>
                        </select>
                        <button class="btn" id="startCameraBtn">🎥 开启摄像头</button>
                        <button class="btn btn-danger hidden" id="stopCameraBtn">⏹️ 停止</button>
                    </div>
                </div>
                <video id="cameraVideo" class="camera-video" autoplay playsinline muted></video>
            </div>

            <!-- 视频文件模式 -->
            <div id="videoMode" class="hidden">
                <div class="upload-area" id="videoUploadArea">
                    <div class="upload-icon">🎬</div>
                    <p>点击或拖拽上传视频文件</p>
                    <p style="color: #666; font-size: 14px; margin-top: 10px;">支持 MP4、AVI、MOV 格式</p>
                </div>
                <input type="file" id="videoInput" accept="video/*">
                <video id="videoPreview" controls style="display: none; margin-top: 15px;"></video>
                <div class="progress-bar hidden" id="videoProgress">
                    <div class="progress-fill" id="videoProgressFill">0%</div>
                </div>
            </div>
            
            <!-- 预览区域 -->
            <div class="preview-section" id="previewSection">
                <h3 style="margin-bottom: 15px;">检测结果</h3>
                <div class="image-container">
                    <img id="previewImage" alt="预览">
                </div>
                <div style="margin-top: 15px; text-align: center;" id="imageControls">
                    <button class="btn" id="detectBtn">🔍 开始检测</button>
                </div>
            </div>
            
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p id="loadingText">正在处理...</p>
            </div>
            
            <div id="message"></div>
        </div>
        
        <!-- 结果展示 -->
        <div class="card result-section" id="resultSection">
            <h3 style="margin-bottom: 20px;">📊 检测结果</h3>
            <div class="stats" id="stats"></div>
            <h4 style="margin: 20px 0 15px;">检测到的物体</h4>
            <div class="object-list" id="objectList"></div>
        </div>
    </div>

    <script>
        // 防抖函数 - 用于减少请求频率
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 全局变量
        let currentMode = 'image';
        let currentFile = null;
        let ws = null;
        let cameraStream = null; 
        let isCameraRunning = false;
        let frameInterval = null;
        let fps = 0;
        let lastFrameTime = Date.now();
        let currentRequestController = null; // 用于管理当前请求
        let isProcessing = false; //用于标记当前是否被处理

        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const videoUploadArea = document.getElementById('videoUploadArea');
        const videoInput = document.getElementById('videoInput');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const cameraVideo = document.getElementById('cameraVideo');
        const videoPreview = document.getElementById('videoPreview');
        const detectBtn = document.getElementById('detectBtn');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const message = document.getElementById('message');
        const statusBar = document.getElementById('statusBar');
        const wsStatus = document.getElementById('wsStatus');
        const wsStatusText = document.getElementById('wsStatusText');
        const fpsCounter = document.getElementById('fpsCounter');

        // 设置默认值
        const DEFAULT_SETTINGS = {
            classes: '',
            confThreshold: '0.5',
            batchSize: '8',
            frameInterval: '1'
        };

        // 初始化设置
        function initSettings() {
            const saved = localStorage.getItem('detectionSettings');
            const settings = saved ? JSON.parse(saved) : DEFAULT_SETTINGS;

            document.getElementById('classesSelect').value = settings.classes;
            document.getElementById('confThreshold').value = settings.confThreshold;
            document.getElementById('batchSize').value = settings.batchSize;
            document.getElementById('frameInterval').value = settings.frameInterval;
        }

        // 切换设置面板显示/隐藏
        function toggleSettingsPanel() {
            const panel = document.getElementById('settingsPanel');
            const btn = document.getElementById('toggleSettingsBtn');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                btn.textContent = '📋 隐藏设置';
                btn.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
            } else {
                panel.style.display = 'none';
                btn.textContent = '⚙️ 检测设置';
                btn.style.background = '';
            }
        }

        // 关闭设置面板
        function closeSettingsPanel() {
            document.getElementById('settingsPanel').style.display = 'none';
            document.getElementById('toggleSettingsBtn').textContent = '⚙️ 检测设置';
            document.getElementById('toggleSettingsBtn').style.background = '';
        }

        // 保存设置
        function saveSettings() {
            const settings = {
                classes: document.getElementById('classesSelect').value,
                confThreshold: document.getElementById('confThreshold').value,
                batchSize: document.getElementById('batchSize').value,
                frameInterval: document.getElementById('frameInterval').value
            };
            localStorage.setItem('detectionSettings', JSON.stringify(settings));
            return settings;
        }

        // 重置设置
        function resetSettings() {
            document.getElementById('classesSelect').value = DEFAULT_SETTINGS.classes;
            document.getElementById('confThreshold').value = DEFAULT_SETTINGS.confThreshold;
            document.getElementById('batchSize').value = DEFAULT_SETTINGS.batchSize;
            document.getElementById('frameInterval').value = DEFAULT_SETTINGS.frameInterval;
            localStorage.removeItem('detectionSettings');
            showMessage('设置已重置为默认值', 'success');
        }

        // 获取当前设置
        function getCurrentSettings() {
            return {
                classes: document.getElementById('classesSelect').value,
                confThreshold: document.getElementById('confThreshold').value,
                batchSize: document.getElementById('batchSize').value,
                frameInterval: document.getElementById('frameInterval').value
            };
        }

        // 初始化设置
        initSettings();

        // 绑定初始检测按钮事件
        function bindInitialDetectBtnEvent() {
            const detectBtn = document.getElementById('detectBtn');
            if (detectBtn && !detectBtn.onclick) {
                detectBtn.onclick = async () => {
                    console.log('开始检测按钮被点击（初始）');
                    if (!currentFile) {
                        console.log('没有选择文件');
                        return;
                    }

                    if (currentRequestController) {
                        currentRequestController.abort();
                    }

                    currentRequestController = new AbortController();
                    const signal = currentRequestController.signal;

                    loading.style.display = 'block';
                    detectBtn.disabled = true;
                    hideMessage();

                    const formData = new FormData();
                    formData.append('file', currentFile);

                    const settings = getCurrentSettings();
                    if (settings.classes) {
                        formData.append('classes', settings.classes);
                    }
                    formData.append('conf_threshold', settings.confThreshold);

                    try {
                        const response = await fetch('/api/v1/detect', {
                            method: 'POST',
                            body: formData,
                            signal
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }

                        const data = await response.json();
                        displayResults(data);
                        showMessage('检测完成！', 'success');
                    } catch (error) {
                        if (error.name === 'AbortError') {
                            console.log('Request was cancelled');
                            showMessage('请求已取消', 'info');
                        } else {
                            console.error('检测失败:', error);
                            showMessage('检测失败：' + error.message, 'error');
                        }
                    } finally {
                        loading.style.display = 'none';
                        detectBtn.disabled = false;
                        currentRequestController = null;
                    }
                };
            }
        }

        // 绑定初始按钮事件
        bindInitialDetectBtnEvent();

        // 模式切换
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                switchMode(mode);
            });
        });

        function switchMode(mode) {
            currentMode = mode;

            // 更新按钮状态
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });

            // 显示/隐藏对应区域
            document.getElementById('imageMode').classList.toggle('hidden', mode !== 'image');
            document.getElementById('cameraMode').classList.toggle('hidden', mode !== 'camera');
            document.getElementById('videoMode').classList.toggle('hidden', mode !== 'video');

            // 重置状态
            resetState();

            if (mode === 'camera') {
                statusBar.style.display = 'flex';
                // 在摄像头模式下隐藏检测按钮
                document.getElementById('imageControls').style.display = 'none';
            } else {
                statusBar.style.display = 'none';
                stopCamera();
                // 在非摄像头模式下显示检测按钮
                document.getElementById('imageControls').style.display = 'block';
            }
        }

        function resetState() {
            // 如果有正在进行的请求，取消它
            if (currentRequestController) {
                currentRequestController.abort();
                currentRequestController = null;
            }

            previewSection.classList.remove('active');
            resultSection.classList.remove('active');
            previewImage.src = '';
            hideMessage();
            currentFile = null;

            // 停止加载状态
            loading.style.display = 'none';

            // 重置视频预览状态
            const videoPreview = document.getElementById('videoPreview');
            if (videoPreview) {
                videoPreview.style.display = 'none';
                videoPreview.src = '';
            }

            // 隐藏视频上传区域
            const videoUploadArea = document.getElementById('videoUploadArea');
            if (videoUploadArea) {
                videoUploadArea.style.display = 'block';
            }

            // 重置 imageControls 区域到初始状态（但不改变显示/隐藏状态）
            const imageControls = document.getElementById('imageControls');
            imageControls.innerHTML = `
                <button class="btn" id="detectBtn">🔍 开始检测</button>
            `;

            // 重新绑定检测按钮的事件监听器 - 使用 onclick 避免多次绑定
            const newDetectBtn = imageControls.querySelector('#detectBtn');
            newDetectBtn.onclick = async () => {
                console.log('开始检测按钮被点击');
                if (!currentFile) {
                    console.log('没有选择文件');
                    return;
                }

                // 如果已经有请求在运行，取消它
                if (currentRequestController) {
                    currentRequestController.abort();
                }

                // 创建新的控制器
                currentRequestController = new AbortController();
                const signal = currentRequestController.signal;

                loading.style.display = 'block';
                newDetectBtn.disabled = true;
                hideMessage();

                const formData = new FormData();
                formData.append('file', currentFile);

                // 添加检测设置参数
                const settings = getCurrentSettings();
                if (settings.classes) {
                    formData.append('classes', settings.classes);
                }
                formData.append('conf_threshold', settings.confThreshold);

                try {
                    const response = await fetch('/api/v1/detect', {
                        method: 'POST',
                        body: formData,
                        signal  // 添加信号以支持取消
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    displayResults(data);
                    showMessage('检测完成！', 'success');
                } catch (error) {
                    if (error.name === 'AbortError') {
                        console.log('Request was cancelled');
                        showMessage('请求已取消', 'info');
                    } else {
                        showMessage('检测失败: ' + error.message, 'error');
                    }
                } finally {
                    loading.style.display = 'none';
                    newDetectBtn.disabled = false;
                    // 请求完成后清除控制器
                    currentRequestController = null;
                }
            };
        }

        // 图片上传
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleImageFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleImageFile(e.target.files[0]);
            }
        });

        // 应用设置按钮
        document.getElementById('applySettingsBtn').addEventListener('click', () => {
            const settings = saveSettings();
            const classesText = settings.classes || '全部';
            showMessage(`设置已应用并保存：检测类别=${classesText}，置信度阈值=${settings.confThreshold}，批处理大小=${settings.batchSize}，帧间隔=${settings.frameInterval}`, 'success');
        });

        // 重置设置按钮
        document.getElementById('resetSettingsBtn').addEventListener('click', () => {
            resetSettings();
        });

        // 切换设置面板按钮
        document.getElementById('toggleSettingsBtn').onclick = toggleSettingsPanel;

        // 关闭设置面板按钮
        document.getElementById('closeSettingsBtn').onclick = closeSettingsPanel;

        function handleImageFile(file) {
            if (!file.type.startsWith('image/')) {
                showMessage('请选择图片文件', 'error');
                return;
            }

            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewSection.classList.add('active');
                resultSection.classList.remove('active');
                cameraVideo.style.display = 'none';
                videoPreview.style.display = 'none';
                previewImage.style.display = 'block';
                hideMessage();

                // 显示检测按钮
                document.getElementById('imageControls').innerHTML = `
                    <button class="btn" id="detectBtn">🔍 开始检测</button>
                `;

                // 重新绑定检测按钮事件
                const detectBtn = document.getElementById('detectBtn');
                detectBtn.onclick = async () => {
                    if (!currentFile) {
                        console.error('No file selected');
                        return;
                    }

                    // 如果已经有请求在运行，取消它
                    if (currentRequestController) {
                        currentRequestController.abort();
                    }

                    // 创建新的控制器
                    currentRequestController = new AbortController();
                    const signal = currentRequestController.signal;

                    loading.style.display = 'block';
                    document.getElementById('loadingText').textContent = '正在检测图片...';

                    const formData = new FormData();
                    formData.append('file', currentFile);

                    // 添加检测设置参数
                    const settings = getCurrentSettings();
                    if (settings.classes) {
                        formData.append('classes', settings.classes);
                    }
                    formData.append('conf_threshold', settings.confThreshold);

                    try {
                        const response = await fetch('/api/v1/detect', {
                            method: 'POST',
                            body: formData,
                            signal
                        });

                        if (!response.ok) {
                            throw new Error('Request failed');
                        }

                        const data = await response.json();
                        displayResults(data);
                    } catch (error) {
                        if (error.name === 'AbortError') {
                            console.log('Request was cancelled');
                            showMessage('请求已取消', 'info');
                        } else {
                            showMessage('检测失败：' + error.message, 'error');
                        }
                    } finally {
                        loading.style.display = 'none';
                    }
                };
            };
            reader.readAsDataURL(file);
        }

        // 视频上传
        videoUploadArea.addEventListener('click', () => videoInput.click());
        
        videoUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            videoUploadArea.classList.add('dragover');
        });

        videoUploadArea.addEventListener('dragleave', () => {
            videoUploadArea.classList.remove('dragover');
        });

        videoUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            videoUploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleVideoFile(e.dataTransfer.files[0]);
            }
        });

        videoInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleVideoFile(e.target.files[0]);
            }
        });

        function handleVideoFile(file) {
            if (!file.type.startsWith('video/')) {
                showMessage('请选择视频文件', 'error');
                return;
            }
            
            currentFile = file;
            const url = URL.createObjectURL(file);
            videoPreview.src = url;
            videoPreview.style.display = 'block';
            videoUploadArea.style.display = 'none';
            
            // 显示处理按钮
            previewSection.classList.add('active');
            previewImage.style.display = 'none';
            cameraVideo.style.display = 'none';
            document.getElementById('imageControls').innerHTML = `
                <button class="btn" onclick="processVideoFile()">🎬 处理视频</button>
            `;
        }

        async function processVideoFile() {
            if (!currentFile) {
                console.error('No file selected');
                return;
            }

            // 如果已经有请求在运行，取消它
            if (currentRequestController) {
                currentRequestController.abort();
            }

            // 创建新的控制器
            currentRequestController = new AbortController();
            const signal = currentRequestController.signal;

            loading.style.display = 'block';
            document.getElementById('loadingText').textContent = '正在处理视频...';

            const formData = new FormData();
            formData.append('file', currentFile);
            formData.append('return_video', 'true');

            // 添加检测设置参数
            const settings = getCurrentSettings();
            if (settings.classes) {
                formData.append('classes', settings.classes);
            }
            formData.append('batch_size', settings.batchSize);
            formData.append('frame_interval', settings.frameInterval);

            // 调试日志
            console.log('Sending video with return_video=true');
            console.log('File:', currentFile.name, 'Size:', currentFile.size);
            console.log('Settings:', settings);

            try {
                const response = await fetch('/api/v1/video', {
                    method: 'POST',
                    body: formData,
                    signal // 添加信号以支持取消
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // 下载处理后的视频
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `detected_${currentFile.name}`;
                a.click();

                showMessage('视频处理完成！', 'success');
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Request was cancelled');
                    showMessage('请求已取消', 'info');
                } else {
                    showMessage('视频处理失败: ' + error.message, 'error');
                }
            } finally {
                loading.style.display = 'none';
                // 请求完成后清除控制器
                currentRequestController = null;
            }
        }

        // 对停止摄像头功能也添加防抖
        const debouncedStopCamera = debounce(function() {
            isCameraRunning = false;

            if (frameInterval) {
                clearInterval(frameInterval);
                frameInterval = null;
            }

            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }

            if (ws) {
                ws.close();
                ws = null;
            }

            cameraVideo.style.display = 'none';
            document.getElementById('startCameraBtn').classList.remove('hidden');
            document.getElementById('stopCameraBtn').classList.add('hidden');

            wsStatus.classList.remove('connected');
            wsStatusText.textContent = '未连接';
            fpsCounter.textContent = '';
        }, 300); // 300ms 内防止重复点击

        // 摄像头功能
        document.getElementById('stopCameraBtn').addEventListener('click', debouncedStopCamera);

        async function startCamera(facingMode = 'user') {
            try {
                // 优化移动端兼容性的摄像头参数
                const constraints = {
                    video: {
                        facingMode: facingMode, // 'user' 为前置摄像头, 'environment' 为后置摄像头
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                    }
                };

                // 尝试获取用户媒体
                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);

                cameraVideo.srcObject = cameraStream;
                cameraVideo.style.display = 'block';
                previewSection.classList.add('active');
                previewImage.style.display = 'none';
                videoPreview.style.display = 'none';

                document.getElementById('startCameraBtn').classList.add('hidden');
                document.getElementById('stopCameraBtn').classList.remove('hidden');

                isCameraRunning = true;
                connectWebSocket();

                // 开始发送帧
                setTimeout(() => {
                    frameInterval = setInterval(sendFrame, 30); // 调整为40ms，对应25FPS
                }, 100);

            } catch (error) {
                // 更详细的错误处理，包括权限错误
                console.error('摄像头访问错误:', error);
                if (error.name === 'NotAllowedError') {
                    showMessage('摄像头访问被拒绝，请检查浏览器权限设置，确保允许此站点访问摄像头', 'error');
                } else if (error.name === 'NotFoundError') {
                    showMessage('未找到可用摄像头', 'error');
                } else if (error.name === 'NotReadableError') {
                    showMessage('摄像头被其他应用占用', 'error');
                } else if (error.name === 'OverconstrainedError') {
                    // 如果指定的约束条件无法满足，尝试基本约束
                    const facingMode = document.getElementById('cameraFacingMode').value;
                    tryFallbackCameraAccess(facingMode);
                } else {
                    showMessage('无法访问摄像头: ' + error.message, 'error');
                }
            }
        }

        // 摄像头访问降级处理
        async function tryFallbackCameraAccess(facingMode = 'user') {
            try {
                // 尝试最基本的摄像头访问
                const constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                    }
                };

                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);

                cameraVideo.srcObject = cameraStream;
                cameraVideo.style.display = 'block';
                previewSection.classList.add('active');
                previewImage.style.display = 'none';
                videoPreview.style.display = 'none';

                document.getElementById('startCameraBtn').classList.add('hidden');
                document.getElementById('stopCameraBtn').classList.remove('hidden');

                isCameraRunning = true;
                connectWebSocket();

                // 开始发送帧
                setTimeout(() => {
                    frameInterval = setInterval(sendFrame, 30); // 调整为40ms，对应25FPS
                }, 1000);

            } catch (error) {
                showMessage('无法访问摄像头，请检查设备摄像头权限设置', 'error');
            }
        }

        // 摄像头启动前检查和提示 - 添加防抖
        const debouncedRequestCameraPermission = debounce(async function() {
            try {
                // 获取用户选择的摄像头方向
                const facingMode = document.getElementById('cameraFacingMode').value;

                // 请求摄像头权限
                const permissionName = 'camera';
                if (navigator.permissions) {
                    const permission = await navigator.permissions.query({name: permissionName});
                    if (permission.state === 'denied') {
                        showMessage('摄像头权限已被拒绝，请在浏览器设置中手动启用', 'error');
                        return false;
                    } else if (permission.state === 'granted') {
                        await startCamera(facingMode);
                        return true;
                    } else { // prompt
                        await startCamera(facingMode);
                        return true;
                    }
                } else {
                    // 旧版浏览器处理
                    await startCamera(facingMode);
                    return true;
                }
            } catch (err) {
                console.error('权限检查失败:', err);
                const facingMode = document.getElementById('cameraFacingMode').value;
                await startCamera(facingMode);
                return true;
            }
        }, 500); // 500ms 内防止重复点击

        // 修改按钮事件处理器
        document.getElementById('startCameraBtn').addEventListener('click', debouncedRequestCameraPermission);

        function stopCamera() {
            isCameraRunning = false;
            
            if (frameInterval) {
                clearInterval(frameInterval);
                frameInterval = null;
            }
            
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            
            if (ws) {
                ws.close();
                ws = null;
            }
            
            cameraVideo.style.display = 'none';
            document.getElementById('startCameraBtn').classList.remove('hidden');
            document.getElementById('stopCameraBtn').classList.add('hidden');
            
            wsStatus.classList.remove('connected');
            wsStatusText.textContent = '未连接';
            fpsCounter.textContent = '';
        }

        // WebSocket 连接
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/detect`);
            ws.binaryType = 'arraybuffer'; // 设置二进制数据类型

            ws.onopen = () => {
                console.log('WebSocket 连接成功');
                wsStatus.classList.add('connected');
                wsStatusText.textContent = '已连接';
            };

            ws.onmessage = async (event) => {
                    const blobUrl = URL.createObjectURL(new Blob([event.data], { type: 'image/jpeg' }));
                    previewImage.src = blobUrl;
                    previewImage.style.display = 'block';
                    isProcessing = false;
                    updateFpsDisplay();
            };

            ws.onclose = () => {
                console.log('WebSocket 连接关闭');
                wsStatus.classList.remove('connected');
                wsStatusText.textContent = '已断开';
            };

            ws.onerror = (error) => {
                console.error('WebSocket 错误:', error);
                wsStatusText.textContent = '连接错误';
            };
        }

        // 优化的帧率控制 - 降低发送频率以匹配服务器处理能力
        let lastSentTime = 0;
        let displayLastFrameTime = Date.now();
        let smoothedFps = 25; // 初始值设为期望的FPS
        const FRAME_INTERVAL = 20; // 降低到10FPS以匹配服务器处理能力

        function sendFrame() {
            const now = Date.now();

            // 按固定间隔发送帧，使用更高效的比较
            if ((now - lastSentTime) >= FRAME_INTERVAL && !isProcessing) {
                lastSentTime = now;

                if (!isCameraRunning || !ws || ws.readyState !== WebSocket.OPEN) return;

                isProcessing = true; // 标记正在处理

                // 复用canvas以减少GC压力
                const tempCanvas = document.createElement('canvas');
                const ctx = tempCanvas.getContext('2d');

                // 设置canvas尺寸
                tempCanvas.width = cameraVideo.videoWidth || 640;
                tempCanvas.height = cameraVideo.videoHeight || 480;

                // 绘制视频帧并转换为 JPEG Blob
                ctx.drawImage(cameraVideo, 0, 0);
                tempCanvas.toBlob((blob) => {
                    if (blob && ws.readyState === WebSocket.OPEN) {
                        // 直接发送二进制数据
                        ws.send(blob);
                    }
                    isProcessing = false;
                }, 'image/jpeg', 0.7);

                // 立即销毁canvas以释放内存
                tempCanvas.remove();
            }
        }

        // 优化的FPS显示更新
        function updateFpsDisplay() {
            const now = Date.now();
            const elapsed = now - displayLastFrameTime;

            // 避免除零错误
            if (elapsed > 0) {
                const currentFps = 1000 / elapsed;
                // 使用指数移动平均以获得更平滑的结果
                smoothedFps = 0.7 * smoothedFps + 0.3 * currentFps;
            }

            displayLastFrameTime = now;
            // 四舍五入为整数并更新显示
            fpsCounter.textContent = `${Math.round(smoothedFps)} FPS`;
        }


        // 显示结果 - 现在直接显示带框的图像
        function displayResults(data) {
            updateStats(data);

            // 物体列表
            const objectList = document.getElementById('objectList');
            if (data.objects && data.objects.length > 0) {
                objectList.innerHTML = data.objects.map((obj, index) => `
                    <div class="object-item">
                        <strong>${obj.class_name || '物体'} #${index + 1}</strong>
                        <div style="margin-top: 8px; color: #666; font-size: 14px;">
                            位置: (${obj.bbox.x1}, ${obj.bbox.y1}) - (${obj.bbox.x2}, ${obj.bbox.y2})<br>
                            大小: ${obj.bbox.width}×${obj.bbox.height}<br>
                            置信度: ${(obj.confidence * 100).toFixed(1)}%
                        </div>
                    </div>
                `).join('');

                // 检查是否已有带框图像返回
                if (data.annotated_image) {
                    // 直接显示带框的图像，不再使用canvas绘图
                    previewImage.src = data.annotated_image;
                }
            } else {
                objectList.innerHTML = '<p style="text-align: center; color: #666;">未检测到物体</p>';
                // 如果没有检测到但有带框图像，则显示带框图像
                if (data.annotated_image) {
                    previewImage.src = data.annotated_image;
                }
            }

            resultSection.classList.add('active');
        }

        function updateStats(data) {
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${data.object_count || 0}</div>
                    <div class="stat-label">检测到物体数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${data.inference_time_ms || 0}ms</div>
                    <div class="stat-label">推理耗时</div>
                </div>
            `;
        }

        function showMessage(text, type) {
            message.innerHTML = `<div class="message ${type}">${text}</div>`;
        }

        function hideMessage() {
            message.innerHTML = '';
        }
    </script>
</body>
</html>
